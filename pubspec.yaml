name: foos
description: "Foos — the Kevin vs Josh foosball league. Android shell around the shared web app."
publish_to: 'none'

# Version is the single source of truth for the app's version.
# publish.ps1 bumps this; the in-app updater compares it to the latest
# GitHub Release. (Mirrors the BodyComp / Pantry pipeline.)
version: 1.0.2+2

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # The WebView — loads the Foos web app (GitHub Pages).
  webview_flutter: ^4.10.0

  # In-app OTA updater (same stack as BodyComp / Pantry)
  http: ^1.2.2               # GitHub Releases API
  package_info_plus: ^8.1.0  # read the installed app version
  ota_update: ^7.0.0         # download + install a newer APK

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1  # generates the launcher icon

# App launcher icon. Source art generated by scratchpad/gen_icon.py.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/foos_icon.png"
  adaptive_icon_background: "#0B0E0C"
  adaptive_icon_foreground: "assets/icon/foos_icon_fg.png"
  min_sdk_android: 26

flutter:
  uses-material-design: true
